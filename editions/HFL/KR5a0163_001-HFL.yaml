front:
  text: 易象圖說外篇卷上雲八
  hash: sha256:149931290bc7c9a7b8247615912d316e1abcfcaa4166ddb314bf96ee146c806a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0163_HFL_001-001a, image: hfl/0072/0072-084.png}
body:
  text: 清江後學張理仲純述易者道也天地人三才之道若稽古聖神繼天立極肇修人紀懼後世之弗覺弗悟而始示其道於人也是逆也迎之莫探其始隂陽無始循之莫測其终循理無窮其小無内貫通么微其大無垠包括天地天得之揭日月而常運地得之截河嶽而不傾聖人仰觀其象之玄故畫一一而擬之於天俯察其順之勢故畫一一而擬之终地易圖之上奇下偶即所謂太極生兩儀周子謂太極動而生陽靜而生隂者也天有隂陽地有柔剛故竒偶各生奇偶而四象備天象下垂地氣上躋易圖之隂陽剛柔即所謂兩儀生四象周子謂陽變隂合而生水火木金土也天有四時春秋冬夏地有四隅東西南北故四象各生竒偶而八卦彰乾兊離震生於上仰而反觀者天之象也坤艮坎巽生於下俯而順察者地之形也即所謂四象生八卦周子謂無極之真二五之精妙合而凝乾道成男坤道成女者也陽而純者乾之徤隂而順者坤之元陽而外明者離爲火隂而内昭者坎爲川陽而𨺚者艮之象隂而窪者兊之原鼓舞而震動者震當之屬噓吸而披拂者巽風之宣八象相交而易道著惟人也乃特立乎其中而克肖焉記曰人者天地之德隂陽之交鬼神之㑹五行之秀者也顚而圓者乾爲首膰而垂者坤爲腹震肱居上動於手巽股居下隨於足艮鼻而兊口坎耳而離目渴而飮飢而食朝而作暮而息紛紛汨汨亦何以異於物不物於物是以稱有聖人者岀百姓日用而不知唯聖人則岀乎其類拔乎其萃者也聖人者德合天地明並日月掌握宇宙調御隂陽仁智周覆乎天下德澤垂裕乎後昆致中和而天地位萬物育至誠感而神祗格鳥獸馴聖人之道如是而後謂之爲能踐形孟子曰鈞是人從其大體爲大人從其小體爲小人萬物皆備於我亦曰反身而誠仁義禮智我固有之仁知效天之隂陽義禮法地之柔剛分而言之仁隂而知陽禮柔而義剛天行徤吾則體之而自強不息地勢坤吾則順之而厚德載物繼離而明照習坎而常德止乎艮而思不岀位動乎震而恐𢣷修省重巽以申命行事麗兊而朋友講習乾至震六卦反諸巳巽與兊二卦喻諸人當其泰則財成輔相泰之象曰天地交泰后以財成天地之道輔相天地之宜以左右民當其否則儉德辭榮五之象曰天地不交否君子以儉德辟難不可榮以䘵於益而遷善改過益之象曰風雷益君子以見善則遷有過則改於損而窒慾懲忿損之象曰山下有澤損君子以懲忿窒慾大而揖讓放伐小而動靜語黙其道皆備於易明之爲禮樂幽之爲鬼神三網五常百世相因傳曰天地設位而易行乎其中矣成性存存道義之門夫易聖人所以崇德而廣業也懼後世之弗明是故作易而以其道覺諸人愚末小子敢曰希賢希聖希天觀象述圖而次第之曰大易卦畫之原象數傳曰易有太極朱子曰易者隂陽之變太極者其理也謂之太極者至極之義兼有標準之名實造化之樞紐品彚之根柢也本無形體聲臭之可指至宋濓溪先生始晝一圏而今圖因之説文曰惟初太極道立于一造分天地化成萬物一者數之始也象数二右象天地人三才各一太極邵康節曰天開於子地闢於丑人生於寅夏以建寅之月爲正月謂斗柄初昏遠寅之月也謂之人統易曰連山以艮爲首艮者人也周易艮卦六爻亦以人身取處商以建丑之月爲正月謂之地統易曰歸藏以坤爲首坤者地也周以建子之月爲正月謂之天統易曰周易以乾爲首乾者天也注䟽家以山能出内雲氣地能歸藏萬物天能周帀六合其言乾坤之義然矣於艮之義則未盡艮者萬物之所以成終而成始也人爲萬物之靈故主人而言是知夏尚忠人之義也商尚質地之理也周尚文天之象也三代迭興三統異尚而聖人答顔子爲邦之問斵曰行夏之時乗殷之輅服周之冕法天道行地利用人紀之義彰矣斯所謂百王不易之大法也故曰仲尼祖逆尭舜憲章文武上律天時下襲水土北之謂也韓子曰形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間夷狄禽獸皆人也程子曰天地交而萬物生於中然後三才備人爲最靈故爲萬物之首凡生天地之中者皆人道也象数三天地之數中乎圖書之象著乎皇極之位建乎者中也中也者四方之交會也東木西金南火北水其行之序則曰木火土金水木火爲陽金水爲隂土居中央亦隂亦陽其生之序則曰水火本金土水木爲陽火金爲隂天以一生水而地以六成之故河圖一六居北而爲水地以二生火而天以七成之故河圖二七居南而爲火天以三生木而地以八成之故河圖三八居東而爲木地以四生金而天以九成之故河圖四九居西而爲金五以生土而地以十成之故河圖十居中而爲土交貫四氣而作其樞紐也是故五行之象見乎天五行之質具乎地人肖天地以有生具五氣以成形禀五性以成德故語性道者無一不本於是得其氣之正且通者爲聖爲賢得其氣之偏且窒者爲愚爲不肖然五方之習俗又各隨其所見而局於一偏其嗜欲好尚亦有所不同者矣東方生地日之所出故習見其生而老氏有長生之說西方收地日之所入故習見其死而佛氏有寂滅之說南方明盛陽之伸而神靈著焉北方幽翳隂之屈而鬼怪見焉惟聖人中天下而立定四海之民嚮明而治無思也無爲也寂然不動感而逆通天下之故天下之至神也周子曰聖人定之以中正仁義而主靜立人極焉象數四周子曰陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也無極之眞二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉唯人也得其秀而最靈形旣生矣神發知矣五性感動而善惡分萬事出矣聖人定之以中正仁義而主靜立人極焉君子修之吉小人悖之凶大哉易也斯其至矣象数五右十中交九宫之叙即洛書之數也一三九七天數也天數奇竒之象圓氣於三其數左旋始於一居于正北一三如三故二次于正東三三如九故九次于正南三九二十七故七次于正西三七二十一而復于一二四八六地数也地數偶偶之象方兩於二其數右轉起于西南二二如四故四次於東南二四如八故八次于東北二八十六故六次于西北二六十二而歸于二此隂陽在右運行自然之妙而二七四九易位與河圓不同者也内經曰天數始於一终於九焉一者天二者地三者人三而成天三而成地三而成人三而三之合則爲九九分爲九野正北曰冀州今大都燕南河間平陽等路正東曰青州今益都沂密登萊等州正南曰揚州今兩淮兩浙江東江西甌閩等處正西曰梁州今川蜀雲姚等處正中曰豫州今河南襄陽等處東北曰充州今濟南東平東昌濟寧等處東南曰徐州今徐邳宿毫等州西南曰荆州今荊潭湖廣等處西北曰雍州今陝西甘肅等處是故神禹别之而作貢箕子演之而叙疇他如運氣太乙隂陽醫家者流雖純駁不同要皆不出乎此九宫之數也右圖一三五七九而兩儀四象八卦在其中矣陽倡而隂和陽實而隂虚儀雖兩而實三象雖四而實五卦雖八而實九于以見天地間非陽不生非隂不成造化自然之本原也象數六右河洛十生成之象傳曰河出圖洛出書聖人則之則者法其象與數也数始於一小衍之而成大衍之而成十十者數之結括而圖書者倚數之大原卦晝之凖則也此象縱橫十有數正則河圖中宫天乗地十之象其中者易也即圖書中之中動而陽上同乎天其象爲靜而隂下同乎地其象爲天下生爲隂陽地上生爲柔剛即圖書中之上下左右其數明陽一隂四剛三柔二衍而一六二七三八四九即圖書四維之東西南北分爲八卦合爲五行五行之生也各一其性此圖之象原其生而河圖之位據其旺洛書之位緫其變大衍之周揭其實也河圖木東火南金西水北正也洛書金火易位金南火西變也夫以始生之序言之坎巽生於地之剛朱子所謂少陽少陽之位寅於時爲春其数三小衍成則有二大衍成十則有七二七爲火故火生在寅旺於午稽之河圖則二七居南而乾兊得其位乾居七兊居二乾兊生於天之陽朱子所謂太陽太陽之位巳巳爲六陽之極於時爲夏其數一小衍成則有四大衍成十則有九四九爲金故金生在巳旺於酉稽之河圖則四九居西而巽坎得其位巽居四坎居九乾交坎而坎交乾巽易兊而兊易巽也離震生於天之隂朱子所謂少隂少隂之位申於時爲秋其數四小衍成則有一大衍成十則有六一六爲水故水生在申旺於子稽之河圖則一六居北而坤艮得其位艮居一坤居六坤艮生於地之柔朱子所謂太隂太隂之位亥亥爲六隂之極於時爲冬其數二小衍成則有三大衍成十則有八三八爲木故木生在亥旺於卯稽之河圖則三八居東而離震得其位震居三離居八坤交離而離交坤震易艮而艮易震也是知先天之象本之圖乾七兊二位乎剛離八震三位乎柔天之四象交乎地也坤六艮一位乎隂坎九巽四位乎陽地之四象交乎天也後天之象本之圖乾兊生於天之陽乾一兊九而成十乾居一兊居九離艮生终天之隂震及爲艮離七艮三而成十離居七艮居三坤震生於地之柔艮反爲震坤二震八而成十坤居二震居八坎巽生於地之剛坎六巽四而成十坎居六巽居四令圖後天巽二而坤四者邵子所謂長女代毋者也先後二五象數脗合則圖書卦厥有㫖哉易象圖説外篇卷上
