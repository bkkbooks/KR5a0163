  text: 易象圖說外篇卷下雲十
  hash: sha256:d7af298eeb0c8978dd1358d3286018ceb287252ce8f08a8230da42b1adb3e5ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0163_HFL_003-001a, image: hfl/0072/0072-140.png}
body:
  text: 清江後學張理仲純述度數一右周天歷象氣節之圖革之象曰澤中有火革君子以治歷明時四時變化革之大者治歷数者推日月星辰之遷易以明四時之序而於澤中有火言之何也說卦離爲火爲日兊爲澤爲水而邵子經世書以兊爲月離爲星星者日之餘也由是言之則離兊二卦有日月星三辰之象焉故彖曰水火相息水爲月火爲日日月相推而明生焉水爲寒火爲暑寒暑相推而歳成焉夫懸象著明莫大乎日月天垂象而聖人象之觀周歳日月之行所㑹爲辰辰十有二前代之暦更革不一今據授時曆孟春之月日月會于玄枵仲春㑹于陬訾季春㑹于降婁孟夏㑹于大梁仲夏㑹于實沈季夏㑹于鶉首孟秋㑹于鶉火仲秋㑹于鶉尾季秋會于壽星孟冬㑹于大火仲冬㑹于析木季冬會于星紀凡十有二辰按月令孟春之月日在營室斗建在寅故寅與亥合仲春之月日在降婁斗建在卯故卯與戍合余月次第推之今日月行度既有差移建辰不復相合而欲依古候氣造律或者有所不侔矣所次爲舍舍二十有八東方蒼龍七宿角亢氐房心尾箕北方玄武七宿斗牛女虚危室壁西方白虎七宿奎婁胃昴畢觜參南方朱鳥七宿井鬼栁星張翼軫是爲二十八宿所歷爲度度三百六十有五度四分度之一天本無度因日之行而有度其二十八宿宿度多寡之不同又以日行有淺深東方七宿凡七十五度北方七宿凡九十八度西方七宿凡八十度南方七宿凡百一十二度合之爲三百六十五度由是叙之爲四時正之爲八節建之爲十二月分之爲二十四氣定之爲七十二候朞之爲三百六十五日四分日之一而一歳周矣夫易者範圖天地之化而不過者也易有四象以應四時少陽爲春太陽爲夏少隂爲秋太隂爲冬易有八卦以應八節立春爲艮春分爲震立夏爲巽夏至爲離立秋爲坤秋分爲兊立冬爲乾冬至爲坎八卦以應八節卦有十二辟以應十二辰復十一月臨十二月秦正月大壯二月夬三月乾四月姤五月遯六月否七月觀八月剥九月坤十月爲十二辟封八卦二十四爻以應二十四氣辟卦七十二爻以應七十二侯反易之卦二十有八以應二十八舍六十四卦三百八十四爻當朞之日以應周天三百六十五度是故履端於始表正於中歸餘於终合氣朔虚盈而閠生焉傅曰日月運行一寒一暑洪範曰日月之行則有冬有夏冬至日行北陸而寒夏至日行南陸而暑春行西陸秋行東陸而晝夜平温凉均是故馮相氏冬夏故日春秋致月以辨四時之叙致日之法樹八尺之杙於地四維四中引八繩以正之夏至景長一尺五寸而日極長冬至景長一丈三尺而日極短極長極短之間相距一丈一尺五寸冬至後日漸長至春分則景減五尺七寸半而晝夜等又減至夏至而景正一尺五寸夏至後日漸短至秋分則景比夏至而長五尺七寸半而晝夜平又長至冬至而仍得一丈三尺其晷爲如度而歳美人和晷不如度者歳惡人僞晷進則水咎退則早進尺二寸則月食退尺二寸剛日食曰行出黄道外則晷長長則隂勝故水日行入黄道内則晷短短則陽勝故早進尺二寸則月食者月以十二爲數以勢言之宜爲月食退尺二寸則爲日食者日之數備於十畧進爲盈退爲縮故爲日食致月之法按天文志月有九行黑道二出黃道北赤道二岀黄道南白道二出黄道西青道二岀黄道東赤青出陽道曰黒出隂道月失節度行岀陽道則早風出隂道則雨雲九行者通黃道而數之也夏時月在黄道南謂之赤道進入黄道北謂之黑道春時月行黄道東謂之青道進入黄道西謂之白道冬時月行黄道北謂之黒道進入黄道南謂之赤道秋時月行黃道西謂之白道進入黄道東謂之青道此皆不得其正故曰出陽道則旱出隂道則雨若行黄道則是其正也鄭康成云春分日在婁秋分日在角而月弦於牽牛東井亦以其景知氣至不通卦驗云夫八卦氣驗常不在望以入月八日上弦不盡八下日弦候諸卦氣隂氣得正而平以此而言則致月景亦用此日矣謂如春分日在婁則月上弦於東井下弦於牽牛秋分日在角上弦於牽午下弦於東井蓋春分婁星昏正酉秋分角星昏在酉以是推之而月令中星皆可知矣今春分日在壁秋分日在軫則月弦於參井箕斗之間爲不同者歳差然也按授時曆冬至日在箕八度出辰初一刻入申正三刻小寒日在斗十四度岀辰初初入申正四大寒日在女初度岀卯正四入酉初初立春日在虚五度出卯正三入酉初一雨水日在危十度出卯正二入酉初二驚蟄日在室十一度岀卯正一入酉初三春分日在壁八度岀卯初四入酉正初清明日在奎十四度出夘初三入酉正一穀雨日在婁十度岀卯初二入酉正二立夏日在胃十二度岀卯初一入酉正四小滿日在畢一度出寅正四入戌初初芒種日在畢十五庋出寅正三入戌初初夏至日在井三度出寅正三入戌初一小暑日在井十八度出寅正四入戌初初大暑日在柳初度岀卯初初入酉正四立秋日在星一度出卯初一入酉正三處暑日在張九度岀卯初二入酉正二白露日在翼十度岀卯初三入酉正一秋分日在軫一度出卯初四入酉正初寒露日在軫十七度出卯正一入酉初三霜降日在亢二度出卯正二入酉初二立冬日在氐七度岀卯正三入酉初一小雪日在心初度出辰初初入申正四大雪日在尾十度出辰初一入申正三此畫夜長短刻數也天地之氣周流六合日往則月來寒往則暑來前圖圓方二象中建八卦八卦左右相錯一順一逆隂陽相推一徃一来陽爲畫爲温爲熱隂爲夜爲凉爲寒畫夜相感而萬物生寒暑相代而四時成是故五日謂之候三候謂之氣六氣謂之時四時謂之歳一歳二十四氣故八卦二十四爻爻直一氣下體八卦爲貞上體八卦爲悔其爻初與四爲應二與五爲應三與上爲應冬至始於復之初九震下坤上一陽動於重隂之下隂盛而陽㣲以前後十分約之一陽而九隂以前後各二氣併看之始冬至則兼小雪大雪小寒大寒併本位凡五氣共十爻約之余氣同故夜長晝短天氣至是而極寒六二六三爻應皆隂小寒大寒隂沍重極而春氣應立春始於賁之初九離下艮上以前後十分約之三陽而七隂故氣漸温六二九三雨水驚蟄春分中於節之初九兊下坎上隂陽均齊以前後十分約之五陽而五隂天氣至是而和煦畫夜平分九二六三清明榖雨積温生熱而夏氣應立夏起於小畜之初九乾下巽上以前後十分約之七陽而三隂氣候向暑九二九三小滿芒種天氣盛熱夏至至於姤之初六巽下乾上一隂生於重陽之下陽多隂少以前後十分約之一隂而九陽故晝長夜短爻氣呈是而大熱九二九三爻應皆剛小暑太暑熱盛鬱變而秋氣應立秋起於困之初六坎下兊上以前後十分約之三隂而七陽天氣漸凉九二六三處暑白露秋分中於旅之初六艮下離上剛柔中分以前後十分約之五隂而五陽天氣至是而清凉盡夜平均六二九三寒露霜降清極爲寒而冬氣應立冬起於豫之初六坤下震上以前後十分約之七隂而三陽天氣向寒六二六三小雪大雪隂氣盛極而一陽復生於下如環無端周而復始由是八卦相盪一貞而八悔八八六十四卦圜轉周流而天度畢矣六十四卦圖圖見内篇按復姤節旅賁小畜困豫在八卦宫變皆爲一世之卦復姤當二至乾坤以初爻變也節旅當二分坎離以初爻變也賁當立春艮以初爻變也小畜當立夏巽以初爻變也困當立秋兊以初爻變也豫當立冬震以初爻變也二至二分以乾坤坎離變者四正不易之卦也四立以艮巽兊震變者四隅反易之卦也又易中惟此八卦初四隂陽相應而二五三六爻皆不應是以歳有二十四氣而節僅正於八也度數二右地方萬里卦建之圖比之象曰地上有水比先王以建萬國親諸侯王者疆理天下封建邦國以藩衞王室親諸侯所以北天下也夏殷之制蓋不可考妄今因周禮辨方正位體國經野之文而圖次王畿十里郷遂都鄙甸稍縣畺之制而諸侯分封大小侯甸男采衞要夷鎭藩九服遠近因以併見焉䟽太平之世土廣萬里中國七千中平之世通夷秋七千中國五千衰末之世通夷狄五千中國三千故孟子謂海内之地方千里者九公侯地方百里伯七十里子男五十里分土三等蓋夏殷之制而周初因之至周公相成王斥大九州増封有功諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方一百里不能百里而附於諸侯者爲附庸王制云州建二百一十國八州千六百八十國則大較言之耳周禮大司徒以上主之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉右言度地中建王國之制土圭以玉爲之長一尺五寸測土深度日景長短之深也昔周公度土中於頴川陽城立八尺之表以夏至之日晝刻半表北得景長一尺五寸與土圭等求得地中以爲中表中表南千里又置一表爲南表夏至書刻半表北景長一尺四寸不及一寸爲景短其地多暑中表北又置一表爲北表夏里畫刻半表北景長一尺六寸過一寸爲景長其地多寒中表東千里又置一表爲東表其地近日夏呈畫漏半已得夕景故多風中表西千里又置一表其地逺日夏呈畫漏半始得朝景故多隂如是則寒暑隂風偏而不和惟陽城土中隂陽風雨和㑹爲得中也日景於地千里而差一寸者按三光考靈耀云四游升降於三萬里之中日至之景尺有五寸爲地中則是半三萬里而萬五千里與土圭等是千里而差一寸也筭法亦然匠人建國水地以縣置𣙗以縣眂以景識日岀之景以日入之景畫參諸日中之景夜考之極星以正朝夕營國方九里旁三門國中九經九緯經涂九軌左祖右社面朝後市市朝一夫右言建國正位之法水地以縣者於建國之處四角立柱而懸之以水準平其地之髙下也置𣙗以縣眂其景者𣙗臬也古字通立八尺之臬於地中於臬之四角四中縣八引而垂之其引皆附於柱則柱正矣然後於日出日入之時眡柱之景而識其端則東西正矣又畫參日中之景夜考之極星則南北亦正而朝夕正矣此辨方之法也方里而井九井則九里之地南北之道爲經東西之道爲緯九經而九緯之則四旁各三門凡十二門以通十二子經緯之涂皆容九軌軌轍廣也乗車六尺六寸雨傍各加七寸凡八尺是爲徹廣九軌積七十二尺則此涂廣十二歩也門有三涂男子由左女子由右車從中央左祖右社在中門之左右宗廟是陽故在左社稷是隂故在右三朝皆是君臣治政之處陽故在前三市皆是竸利行刑之處隂故在後市朝一夫百畞之地此正位之法也載師掌任土之法以㕓里任國中之地以塲圖任園地以宅田士田賈田任近郊之地以宫田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地右言畿内郷遂都鄙之制王畿之内地方千里中置國城四面至畺各五百里百里爲一節五十里爲近郊百里之内爲遠郊郊地四同中置六郷七萬五千家其餘地以任九等之田郊地四同周有萬井三萬家四同當有十二萬家今以七萬五千家爲六鄉其餘則四萬五千家任九等之由逺郊之外爲甸甸地十二同中置六遂七萬五千家其餘地以任公邑之田田有溝洫遂人掌之甸地十二同當有三十六萬家今以七萬五十家爲六遂其餘則二十八萬五千家任公邑之田甸外爲稍稍地二十同以任家邑之田稍外爲縣縣地二十八同以任小都之田縣外爲畺畺地三十六同以任大都之田田有井牧小司徒經之司馬法曰王國百里爲郊二百里爲州三百里爲野四百里爲縣五百里爲都大司徒掌建邦之土地與人民之數辨其邦國都鄙今五家爲比使之相保五比爲閭使之相受四閭爲族使之相葬五族爲黨使之相救五黨爲州使之相賙五州爲郷使之相賔凡造都鄙制其地域而封溝之以其室數制之不易之地家百畞一易之地家二百畞再易之地家三百畞都鄙王子弟公𡖥大夫之采地也其制三等公在大都采地方百里𡖥在小都采地方五十里大夫在家邑采地方二十五里親五子弟與公同次䟽者與𡖥同次更䟽者與大夫同小司徒乃㑹萬民之卒伍而用之五人爲伍五伍爲兩四兩爲卒五卒爲旅五旅爲師五帥爲軍以起軍旅以作田役以此追胥以令貢賦六軍之士岀自六郷六鄉之内有比閭族黨州郷五家爲比凡起徒役無過家人故五人爲伍五比爲閭閭二十五家故二十五人爲兩四閭爲族族百家故百人爲卒五族爲黨黨五百家故五百人爲旅五黨爲州州二千五百家故二千五百人爲帥五州爲郷郷萬二千五百家故萬二千五百人爲軍也以起軍旅謂征伐也以作田役謂田獵役作也以比追胥追謂逐㓂胥謂伺捕盗賊以令貢賦貢謂九穀山澤之材賦謂出車徒給繇役也遂人掌邦之野以土地之圖經田野造縣部形體之法五家爲鄰五鄰爲里四里爲鄼五鄼爲鄙五鄙爲縣五縣爲遂皆有地域溝樹之使各掌其政令刑禁以歳時稽其人民而授之田野簡其兵器教之稼穡野謂甸稍縣都之野按大司徒云比閭族黨州師即此名鄰里鄼鄙縣遂也故鄭註遂之軍法如六郷郷之田制如六遂亦謂其相通也辨其野之土上地中地下地以頒田里上地夫一𠪨田百畞菜五十畞餘夫亦如之中地夫一㕓田百畞菜百畞餘夫亦如之下地夫一𠪨田百畞菜二百畞餘夫亦如之上地夫一𠪨田百畞菜五十畞據大司徒不易之地家百畞無菜田五十畞蓋菜者休不畊之地也一易之地家二百畝則畊者百畞休不畊者百畞休一年而後畊故謂之一易再易之地家三百畞則畊者百畞休不畊者二百畞休二年而復畊故謂之再易上地則無休不畊者故也右萬夫之地地方三十三里少半里此圖一方當百夫百夫有洫一行當千夫千夫有澮九澮而川周其外若以百夫之圖觀之則一方爲一夫夫間有遂以洫作遂觀之一行爲十夫十夫有溝以澮爲溝觀之亦九溝而達于洫以川爲洫觀之其溝澮廣深鄭註與井田相凖但井田法溝澮稀少而此溝洫法溝澮稠多此川廣深當亦倍澮與自然之川異彼則百里之間一大川耳凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以逹于畿十夫二鄰之田百夫一鄼之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也徑畛涂道路皆所以通車徒於國都也徑容牛馬畛容大車涂容乗車一軌道容二軌路容三軌萬夫者方三十三里少半里九萬夫而方一同以南畞圖之則遂縱溝橫洫縱澮橫九澮石川周其外焉師之象曰地中有水師君子以容民畜衆夫水不外乎地兵不外乎農畜衆養民之道必都鄙有章閭井有伍田有封洫孟子謂仁政必自經界始故因地中有水之象兼攷周官之說而圖叙井田之法以附大易之義云右地方十里爲田一成若以爲一同百里之地觀之則以邑作甸以丘作縣以甸作都以溝爲澮以洫爲川也按匠人爲溝洫耜廣五寸二耜爲耦一耦之伐廣尺深尺謂之畝田首倍之廣二尺深二尺謂之遂九夫爲井井間廣四尺深四尺謂之溝方十里爲成成間廣八尺深八尺謂之洫方百里爲同同閭廣二尋深二仭謂之澮畝縱遂横溝縱洫横澮縱自然之川橫司徒乃經土地而井牧其田野九夫爲井四井爲邑四邑爲丘四丘爲甸四甸爲縣四縣爲都以任地事而令貢賦凡稅歛之事此謂造都鄙采地制井田異於郷遂衍沃之地爲井隰皋之地爲牧九夫爲牧率二牧而當一井地方一里畫爲九區區各百畞一夫受百畞是九夫爲井四井爲邑邑方二里四邑爲丘丘方四里四丘爲甸甸方八里四旁加一里則十里爲一成積百井九百夫其中六十四井五百七十六夫出田稅旁三十六井三百二十四夫治洫四成爲縣經作四甸據一成之中而言此通四旁而以甸爲成縣方二十里四縣爲都都方四十里四都方八十里旁加十里乃得方百里爲一同積葛井九萬夫其中六千四百井五萬六千七百夫出田稅三千六百井三萬二千四百夫治澮井田之法備於一同今止於都者采地食者皆四之一其制三等百里之國凡四都一都稅入於王五十里之國凡四縣一縣税入於王二十五里之國凡四甸一甸稅入於王也司馬法田六尺爲歩歩百爲畝畝百爲夫夫三爲屋屋三爲井井十爲通據一成之内一里一截縱横各十截爲一行一行十并爲一通通三十家通爲匹馬士一人徒二人通有九十夫言三十家者官室涂巷三分去一唯有六十夫兩地有不易一易再易之異通率三夫受六夫之地則六十夫地當止有三十家使出馬一匹士一人徒二人通十爲成成方十里百井三百家革車一乗士十人徒二十人成十爲终终千井三千家革車十乗士百人徒二百人终十爲同同方百里萬井三萬家革車百乗士千人徒二千人同十爲封封十萬井井三十萬家革車千乗士萬人徒二萬人封十爲畿畿方十里百萬井三百萬家革車萬乘士十萬人徒二十萬人魯頌公車千乗公徒三萬兼士而言也易象圖說外篇卷下畢
