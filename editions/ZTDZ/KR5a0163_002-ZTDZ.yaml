body:
  text: 清江後學張理仲純述卦爻一右四象八卦六位之圖傳曰昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章右圖天之隂陽分而爲乾兊離震地之柔剛分而爲坤艮炊巽合兩儀四象八卦爲六位上下左右相交乾下交坤巽上交震離下交坎艮上交兊而人當其氣交之中禀天地四象八卦之氣以成形而理亦賦焉頭圓居上得之乾腹虚有容得之坤股肱動作得之震巽離目主視坎耳善聽兊口能言艮鼻處嘿目口陽也得人之氣故動耳鼻隂也得地之氣故靜所謂得是氣而爲是形也知效天之陽於卦爲坎水主知仁效天之隂於卦爲艮山主仁禮法地之柔於卦爲離火主禮義法地之剛於卦爲兊金主義所謂得是理而爲是性也夫旣有是形具是理亦不能無是欲目之於色耳之於聲口之於味鼻之於臭四肢之於安佚欲動情勝愛惡相攻而吉凶生於是聖人順性命之理作易教人以崇其德以廣其業仰觀日月星辰之象寒暑畫夜之變俯察山川草木之形水火土石之化雨露風霆游氣紛擾肖翹飛走庶物流形上下往來升降否泰由是恊之以五紀正之以五事若易書詩春秋禮樂者聖人之所以彌綸天地之道而參賛化育者也卦爻二右四象八卦六節之圖夫四時之氣由乾坤闔闢動靜隂陽升降消息使之然也久至隂極生陽夏呈陽極生隂乾坤隂陽之合也秋分隂之中坤之閭春分陽之中乾之闢冬夏二至隂陽合也春秋二分隂陽離也按圖而觀義斯可見是故揆之卦畫驗之天時以冬至前後各三十日爲一節小雪至大寒春分前六十日爲一節大衆至春分後六十日爲一節春分呈小滿夏至前後各三十日爲一節小滿至大暑秋分前六十日爲一節大暑至秋分後六十日爲一節秋分至小雪六六凡三百有六十日外卦巽温乾熱震凉坤寒天地四時之正氣也中央坎離艮兊四卦配爲雨暘燠寒風天地四時之游氣也游氣紛擾參差不齊五者來備各以其時則百榖用成庶草蕃廡休徵類應極備極無則百榖用不成咎徵變見唯聖人在位致中和以成其位育之功則五事修兩天人應感之幾㣲矣内經四應天之氣動而不息寒暑燥濕風火天之隂陽也人以三隂三陽上奉之應地之氣靜而守位人以五臟六腑下應之五運流行則有太過不及之差六氣升降則有逆從勝復之變所謂靜而守位者常爲毎歳之主氣一曰地氣又曰本氣凡一氣所管六十日八十七刻半大寒至春分厥隂風木爲初之氣風氣流行萬物發生春分呈小滿少隂君火爲二之氣云云卦爻三右四象八卦六體之圖易曰乾坤成列而易立乎其中斯理也成之在人故人受天地隂陽五行之氣以成形火抵一身同乎天地此圖背陽腹隂頭圓象竒竅隂象偶身半以上同乎天身半以下同乎地督脉陽脉也起於下極之俞並於脊裏上至風府入屬於腦衝脉隂脉也起於氣衝並少隂之經俠齊上行至胷中而散故右象自巽中爻至乾上爻象尻至頂督脉之行也自震中爻至坤下爻象胷至少腹衝脉之道也内經言背爲陽陽中之陽心也離爲心大背爲陽陽中之隂肺也兊爲肺金心肺居上其位髙離兊之象也腹爲隂隂中之隂腎也坎爲腎水腹爲隂隂中之陽肝也艮反震爲肝木腎肝居下其位畀坎艮之象也脾者中州隂中之至隂故其位居中此皆隂陽表裏内外相輸應故以應天之隂陽也三焦有各無形謁道諸氣靈樞經云上焦如霧溉灌諸經中焦如漚腐熟水榖下焦如瀆膀胱瀦水夫人能順五氣以攝生和五味以泰身明五性以全德循五常以行道則能參賛而成位育之功夫然謂之踐形故曰人也者天地之德隂陽之交鬼神之㑹五行之秀氣也子程子曰世之人務窮天地萬象之理不知反之一身五臟六腑毛髮筋骨之所存鮮或知之善學者取諸身而巳自一身以觀天地此其義也卦爻四右四象八卦六脉之圖右圖暑熱燥三氣通乎天從火也濕寒風三氣通乎地從水也暑者陽之盛乾也乾爲大赤火之色也熱者火之化離也燥者陽之變震也震爲決燥燥之爲也濕者隂之盛坤也寒者水之化坎也風者隂之變巽也心肺包絡在上屬手經自午至亥六隂生於上從上而走下肝脾腎在下屬足經自子至巳六陽生於下從下而走上上以候外浮以候氣下以候內沉以候血而診法大要可知矣夫寒暑燥濕風火天之六氣也辛甘鹹淡酸苦地之六味也手足三隂三陽人之六脉也人禀天地冲和之氣受五行生化之形隂陽剛柔萃於一身通上下而爲三才生氣根于中命曰神機六氣和於外六味養於内起居有時食飲有節然後能致其和而宅神氣以爲機發之主故身安而無病由夫利害牽乎外情欲耗其中然後六氣六味始得以撓之而病主焉寒濕隂也寒傷榮病於下足經先受之熱火陽也熱傷氣病於上手經先受之風爲隂之陽善行而數變風勝肝肝主筋故拳攣而抽掣者風之爲也燥爲陽之隂善歛而收縮燥勝肺肺主皮毛故枯澀而皺裂者燥之爲也氣皆以味勝治之之法上者涌之下者泄之中者和解之虚者補之實者瀉之不實不虚以經取之此其大法也其詳則黄帝之書備矣今録此者以見易之無不通也卦爻五右四象八卦六經之圖漢翼奉聞之師曰天地設位懸日月布星辰分隂陽定四時列五行以視聖人名之曰道聖人見道然後知王治之象故畫州土建君臣立律暦陳成敗以視賢者名之曰經賢者見經然後知人道知務則詩書易春秋禮樂是也是故聖人作樂以象天制禮以配地樂由陽來禮由隂作禮樂者天之隂陽也易書詩春秋四時也四時和於上四教行於國而禮樂興矣邵子易起三皇春也書起五帝夏也詩起三王秋也春秋五伯冬也予聞之清碧杜先生曰易著禮樂之原書記禮樂之盛詩通禮樂之變春秋救禮樂之壞六經之道明而尺人之道備矣是故易以道隂陽書以明政事詩以詠性情春秋以謹善惡律曆卜筮考驗推測易之餘也詞賦頌賛歌謡諷剌詩之流也詔誥表章論議誌䟽書之裔也傅述紀載表志書題春秋之末也雖五運迭興復有善作豈有能越是四者哉故夫崇禮尚樂居仁由義者先王之教也反常易道索隱行恠者異端之害也是故六經之教行則異端之害息三代盛世聖王之道明當是時豈有異端之害由夫經學晦而邪説詭行乃得駸駸乎其間鳴呼學者其可不務其本而肆爲紛紛之辯學之弗明爲可嘆也卦爻六右四象八卦六律之圖豫之象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖者王者功成治定三綱正九疇叙百姓和洽乃作樂以宣八風之氣立春艮爲條風亦云融風春分震爲明庶風亦云谷風立夏巽爲清明風夏至离爲景風亦云凱風立秋坤爲凉風秋分兊爲閶闔風空冬乾爲不周風冬至坎爲廣莫風以類萬物之情天地之氣感而太和氣至之應不爽時刻故造律之法先定中聲以立其本以次逓互損益相生終於十二而得三統之義焉天開於子子爲天統積陽爲天陽數始於一䆒於九九者陽之用故黃鐘之律營長九寸三分損一下生林鐘未未者丑之衝也地闢於丑丑爲地統積隂爲地隂數始於二中於六六者隂之用故林鐘之律營長六寸三分益一上生太簇寅人生於寅寅爲人統人者隂陽之交參於三合於八故太簇之律營長八寸八者伏羲氏之所以畫八卦順天地通神明者也三統相通三正迭用陽律娶妻隂律生子六律六同歴辰十二還相爲宫而其義爲無窮矣周官大師掌六律六同以合隂陽之聲黃鐘大簇姑洗蕤賔夷斵無射陽聲也大呂應鐘南呂林鐘小呂夾鐘隂聲也蓋日月會於十二次而右轉聖人制六同以象之斗柄運於十二辰而左旋聖人制六律以象之六律陽也左旋以合隂六同隂也右轉以合陽同位者象夫婦異位者象子母本乎乾爻者爲六律本乎坤爻者爲六同六律左旋而生同同爲同位所以象夫婦六同右轉而生律爲異位所以象子毋間八而生所以象八卦旋之爲官所以象三才陽道常饒自子至巳陽之道也其管皆長隂道常乏子午至亥隂之行也其管皆短由是節之以五聲長者聲下短者聲髙下者重濁而舒遲髙者輕清而剽疾宫爲君君者主也居中以暢四方唱始施生爲四聲綱故聲中於宫觸於角祉於徵章於商宇於羽和平沉厚麤大而下者宫聲也勁凝明違從上而下歸於中者啇聲也圓長通徹中平而正者角聲也抑揚流利從下而上歸於中正者徵聲也喓喓而遠徹細小而髙者羽聲也傳曰聞宫音使人溫舒而廣大聞商音使人方正而好義聞角音使人側隱而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮宮爲君商爲臣角爲民徴爲事羽爲物宫無爲以覆物君之象也商有爲而通物臣之象也角善觸而難馭民之象也徵出無而驗有事之象也羽因時而翕張物之象也宫爲君足以御臣商爲臣足以治民角爲民足以興事徵爲事足以成物羽爲物足以致用北其序也本之以五行金木水火土揆之以五則規矩權𢖍䋲正之以五事貌言視聽思播之以八音金石絲竹匏土革木經之以八卦而天施地化人事之紀備矣故夫黃鐘之長十分爲寸十寸爲尺十尺爲丈十丈爲引分寸尺丈引五度審而長短定以之審量則黃鐘之管九寸其中容秬黍千二百粒以爲龠合龠爲合十合爲升十升爲斗十斗爲斛龠合升斗斛五量審而多少均以之平𢖍則黃鐘所容千二百黍其重十二銖兩龠則二十四銖八卦二十四爻爲一兩十六兩爲一斤三百八十四銖六十四卦三百八十四爻三十斤爲一鈞萬有一千五百二十銖二萬之策萬有一千五百二十四鈞爲石銖兩斤鈞石五權謹而輕重平矣故律者順乎天地本乎隂陽應乎人倫原乎情性風之以德感之以樂故民莫不同一而天下化成矣樂書曰人受天地之中以生莫不鍾五行之秀性五常之德其化之也不過以五聲之和達五常之性而巳故聞宮音斯達誠實之心以爲性聞徵音斯達恭敬之心而爲禮聞商音斯達羞惡之心而爲義間羽音斯達是非之心而爲智聞角音斯達惻隱之心而爲仁夫如是則樂行而倫清外則耳目聰明内則血氣和平移風易佫天下皆寧矣卦爻七右四象八卦六典之圖右周禮六官象天地四時其屬三百六十當朞之日以應周天三百六十度書曰唐虞稽古建官惟百内有百揆四嶽外有州牧侯伯蓋自顓頊以來命南正重司天北正黎司地號曰羲和唐堯受之命羲和欽若昊天敬授民時使復舊職而掌天地之事又分命羲仲羲叔和仲和叔使主四時爲六𡖥之任舜攝百揆改地官爲司徒秋官爲士冬宮爲司空春官爲秩宗而殷制天子之五官則又有司馬司㓂之名至周成王參攷殷制作周禮分天地四時之職天官冡宰掌邦治統百官均四海地官司徒掌邦教敷五典擾兆民春官宗伯掌邦禮治神人和上下夏官司馬掌邦政統六師平邦國秋官司㓂掌邦禁詰姦慝刑暴亂冬官司空掌邦土居四民時地利六卿分職各率其屬阜成兆民周於百事立太師太傳太保兹惟三公論道經邦燮理隂陽少師少傅少保曰三孤貳公弘化寅亮天地不以一職名官蓋以象天地之隂陽運行四時周衰官失百度廢弛戰國兵爭各有變易逮呈强泰不師古始罷侯置守立丞相御史大尉之名自漢以來因仍不革官制紊亂政出多門事無統紀夫五地之有四時百官之有六職天下萬事備盡於此若綱之在網裘之挈領雖百世不可易矣後之人君稽古正名捨周官何以哉卦爻八右四象八卦六師之圖傳曰師衆也衆必有所比北而伍兩卒旅師軍之名立焉天子六師大國三軍其竒正變合率皆本乎易象至漢相諸葛武侯得之演而爲八陣天地風雲則後天四維之象也龍虎鳥蛇則後天四正之象也正以立經竒以合變竒正相生首尾相應圓者輻湊方若棊布藏於九地之下靜而翕也動於九天之上動而闢也周流無滯同乎水安重不撓類乎山强毅剛果則兊金之義威斷嚴明則離火之情迅若雷奮發之神也猋若風飛運之速也凡是八者將所宜聞握竒文曰四爲正四爲竒餘竒爲握機陣數有九中心零者大將握之四面八向皆取凖焉陣間容陣隊間容隊以前爲後以後爲前進無速奔退無遽走四頭八尾觸處爲首敵衝其中兩頭皆救五人爲伍五伍爲隊數起於五終於八蓋五者伍法而八則陣法也小成八隊中成六十四隊大成五百一十二隊周軍制五人爲伍五伍爲兩而四兩爲卒則百人也於是五之而小成五百人爲旅又五之而中成二千五百人爲師又五之而大成一萬二千五百人爲軍蓋以五而三因之也八陣則五人爲伍五伍爲隊八之而小成二百人又八之而中成一千六百人又八之而大成一萬二千八百人則以八而三因之也孫子曰治衆如治寡分數是也分數明而多多益辦矣所握之機各當其八之一機中權也如户之樞密運於中而不見其跡故八而實九大將中居八方環列九經九緯以大包小止爲營行爲陣鳥南蛇北龍東虎西天地風雲列于四維四方爲正四隅爲竒竒正相生而變化不窮矣易象圖說外篇卷中
